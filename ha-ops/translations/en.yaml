configuration:
  repo_url:
    name: HA Config Repository URL
    description: SSH or HTTPS URL of the Git repository that stores your managed Home Assistant configuration.
  repo_branch:
    name: HA Config Branch
    description: Git branch that HA Ops should fetch and apply.
  repo_path:
    name: Local Checkout Folder
    description: Folder name used inside the add-on data directory for the local Git checkout.
  manifest_path:
    name: Deployment Manifest Path
    description: Path inside the repository to the HA Ops manifest file, usually ha-ops.json.
  apply_path:
    name: Fallback Home Assistant Path
    description: Legacy fallback source path used only when the deployment manifest is missing.
  git_ssh_key:
    name: Manual SSH Private Key Override
    description: Optional manual private key. Leave empty to use the deploy key generated by HA Ops.
  create_release_snapshot:
    name: Create Local Release Snapshot
    description: Save a fast local copy of all managed live targets before every apply, so HA Ops can roll back quickly.
  create_ha_backup:
    name: Create Home Assistant Backup
    description: Ask Supervisor to create an official partial backup before every apply.
  ha_backup_name_prefix:
    name: Backup Name Prefix
    description: Prefix used when HA Ops creates a Home Assistant backup.
  restart_after_apply:
    name: Restart Targets After Apply
    description: Default restart behavior for targets that do not define their own restart rule in the deployment manifest.
