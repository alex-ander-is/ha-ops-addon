name: "HA Ops"
description: "Git-backed Home Assistant, Mosquitto, and Zigbee2MQTT operator with rollback"
version: "0.3.0"
slug: "ha_ops"
init: false
startup: services
boot: auto
ingress: true
ingress_port: 8099
panel_icon: mdi:source-branch-refresh
hassio_api: true
hassio_role: manager
watchdog: http://[HOST]:[PORT:8099]/health
map:
  - homeassistant_config:rw
  - addon_config:rw
  - all_addon_configs:rw
  - backup:rw
options:
  repo_url: ""
  repo_branch: "main"
  repo_path: "ha-config"
  manifest_path: "ha-ops.json"
  apply_path: "homeassistant"
  git_ssh_key: ""
  create_release_snapshot: true
  create_ha_backup: true
  ha_backup_name_prefix: "ha-ops"
  restart_after_apply: true
schema:
  repo_url: str
  repo_branch: str
  repo_path: str
  manifest_path: str
  apply_path: str
  git_ssh_key: password?
  create_release_snapshot: bool
  create_ha_backup: bool
  ha_backup_name_prefix: str
  restart_after_apply: bool
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
