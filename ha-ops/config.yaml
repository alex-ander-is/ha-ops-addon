name: "HA Ops"
description: "Git-backed Home Assistant config operator with preview, backups, and rollback"
version: "0.7.6"
slug: "ha_ops"
init: false
startup: services
boot: auto
ingress: true
ingress_port: 8099
panel_icon: mdi:source-branch-refresh
hassio_api: true
hassio_role: manager
watchdog: http://[HOST]:[PORT:8099]/health
map:
  - homeassistant_config:rw
  - addon_config:rw
  - all_addon_configs:rw
  - backup:rw
options:
  repo_url: ""
  repo_branch: "main"
  repo_path: "ha-config"
  manifest_path: "ha-ops.json"
  apply_path: "homeassistant"
  git_ssh_key: ""
  create_release_snapshot: true
  create_ha_backup: true
  ha_backup_name_prefix: "ha-ops"
  require_fresh_backup: true
  backup_max_age_hours: 24
  backup_require_location: true
  max_apply_deletions: 25
  release_snapshot_keep_count: 5
  release_snapshot_keep_days: 7
  reload_yaml_after_apply: true
  restart_core_after_apply: false
  stop_core_before_storage_apply: true
  start_core_after_storage_apply: true
  reload_yaml_after_rollback: false
  restart_core_after_rollback: false
  stop_core_before_storage_rollback: true
  start_core_after_storage_rollback: true
  restart_after_apply: false
schema:
  repo_url: str
  repo_branch: str
  repo_path: str
  manifest_path: str
  apply_path: str
  git_ssh_key: password?
  create_release_snapshot: bool
  create_ha_backup: bool
  ha_backup_name_prefix: str
  require_fresh_backup: bool
  backup_max_age_hours: int
  backup_require_location: bool
  max_apply_deletions: int
  release_snapshot_keep_count: int
  release_snapshot_keep_days: int
  reload_yaml_after_apply: bool
  restart_core_after_apply: bool
  stop_core_before_storage_apply: bool
  start_core_after_storage_apply: bool
  reload_yaml_after_rollback: bool
  restart_core_after_rollback: bool
  stop_core_before_storage_rollback: bool
  start_core_after_storage_rollback: bool
  restart_after_apply: bool
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
